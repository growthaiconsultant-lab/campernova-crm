name: CI

# Gate de calidad: corre en cada push a main y en todos los PR.
# La regla de protección de rama exige que el job "quality" quede en verde antes de mergear.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    # Valores dummy: 'prisma generate' no conecta a la DB y los tests unitarios mockean Prisma.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      DIRECT_URL: postgresql://user:pass@localhost:5432/db?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  integration:
    name: integration
    runs-on: ubuntu-latest
    # Base de datos PostgreSQL 17 REAL y efímera, local al runner. No usa secretos ni
    # se conecta a staging/producción. Aplica las migraciones reales del proyecto.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campernova_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      ALLOW_INTEGRATION_DB_RESET: 'true'
      # Credenciales locales al runner (no secretas, base efímera). El guard valida que
      # la URL no apunte a staging/producción antes de migrar o escribir.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campernova_test?schema=public
      CHECK_RLS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campernova_test?schema=public
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campernova_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/campernova_test?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      # Aplica TODAS las migraciones reales sobre la base de test (guard + migrate deploy).
      - name: Prepare integration database (migrations)
        run: pnpm test:integration:prepare

      # Invariante de seguridad: falla si alguna tabla de `public` no tiene RLS.
      - name: RLS invariant (check:rls)
        run: pnpm check:rls

      # Tests de integración con Prisma real contra la base migrada.
      - name: Integration tests
        run: pnpm test:integration

      # Guard de despliegue (solo lectura) end-to-end contra la base efímera migrada: debe
      # devolver PASS porque todas las migraciones locales están aplicadas. No usa secretos ni
      # se conecta a staging/producción; el marcador de entorno valida la guarda anti-confusión.
      - name: Remote-migration guard (read-only → PASS)
        env:
          REMOTE_MIGRATION_GUARD_ENV: production
          REMOTE_MIGRATION_GUARD_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campernova_test?schema=public
          REMOTE_MIGRATION_GUARD_EXPECT_URL_CONTAINS: campernova_test
        run: pnpm check:remote-migrations

  migration-replay:
    name: migration-replay
    runs-on: ubuntu-latest
    # Reconstruye el esquema desde una base PostgreSQL 17 VACÍA aplicando la baseline,
    # y valida RLS, paridad de esquema, conteos de catálogo e idempotencia. Base efímera
    # local al runner; sin secretos ni conexión a staging/producción.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campernova_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campernova_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/campernova_test?schema=public
      CHECK_RLS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campernova_test?schema=public
      PSQL_URL: postgresql://postgres:postgres@localhost:5432/campernova_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Validate migration history invariant
        run: pnpm check:migration-history

      - name: Apply baseline on empty PostgreSQL 17
        run: pnpm prisma migrate deploy

      - name: Confirm exactly the baseline + PR5B1 migration were applied
        run: |
          set -euo pipefail
          count=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM _prisma_migrations WHERE finished_at IS NOT NULL")
          names=$(psql "$PSQL_URL" -tAc "SELECT string_agg(migration_name, ',' ORDER BY migration_name) FROM _prisma_migrations WHERE finished_at IS NOT NULL")
          echo "migraciones aplicadas: $count · nombres: $names"
          test "$count" = "3" || { echo "esperado 3 migraciones aplicadas (baseline + PR5B1 + archivado)"; exit 1; }
          test "$names" = "000000000000_squashed_migrations,20260712000000_add_versioned_document_model,20260719120000_add_lead_archiving_model" || { echo "conjunto u orden de migraciones inesperado"; exit 1; }

      - name: Prisma migrate status (must be up to date)
        run: pnpm prisma migrate status

      - name: RLS invariant (check:rls)
        run: pnpm check:rls

      - name: Schema parity vs schema.prisma (no Prisma-managed diff)
        run: pnpm prisma migrate diff --from-url "$DATABASE_URL" --to-schema-datamodel prisma/schema.prisma --exit-code

      - name: Catalog verifications
        run: |
          set -euo pipefail
          assert() { # $1=label $2=actual $3=expected
            echo "$1: $2 (esperado $3)"
            test "$2" = "$3" || { echo "MISMATCH en $1"; exit 1; }
          }
          tables=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace WHERE n.nspname='public' AND c.relkind='r'")
          columns=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM information_schema.columns WHERE table_schema='public'")
          enums=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM pg_type t JOIN pg_namespace n ON n.oid=t.typnamespace WHERE n.nspname='public' AND t.typtype='e'")
          enum_values=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM pg_enum e JOIN pg_type t ON t.oid=e.enumtypid JOIN pg_namespace n ON n.oid=t.typnamespace WHERE n.nspname='public'")
          fks=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM pg_constraint con JOIN pg_namespace n ON n.oid=con.connamespace WHERE n.nspname='public' AND con.contype='f'")
          indexes=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM pg_indexes WHERE schemaname='public'")
          without_rls=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace WHERE n.nspname='public' AND c.relkind='r' AND c.relrowsecurity=false")
          forced=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace WHERE n.nspname='public' AND c.relkind='r' AND c.relforcerowsecurity=true")
          policies=$(psql "$PSQL_URL" -tAc "SELECT count(*) FROM pg_policies WHERE schemaname='public'")
          # Valores tras PR5B1 (add_versioned_document_model). Delta documentado en el informe:
          #   tables      30 → 31   (+1: document_versions)
          #   columns     412 → 431 (+19: delivery_documents +2, vehicle_documents +2, document_versions +15)
          #   enums       48 → 49   (+1: DocumentVersionStatus)
          #   enum_values 255 → 258 (+3: ACTIVE, REPLACED, DELETED)
          #   foreign_keys 60 → 65  (+5: 2 FK compuestas de versión actual + 3 de document_versions)
          #   indexes     101 → 111 (+10: PK + object_path + 2 idx + 4 unique en document_versions + 2 unique (id,current_version_id))
          # Delta tras add_lead_archiving_model (PR B1, aditivo; sin tablas nuevas):
          #   columns     431 → 439 (+8: seller_leads +4, buyer_leads +4)
          #   enums       49 → 50   (+1: ArchiveReason)
          #   enum_values 258 → 266 (+8: 6 de ArchiveReason + LEAD_ARCHIVADO + LEAD_REACTIVADO)
          #   foreign_keys 65 → 67  (+2: archived_by_id → users, ON DELETE SET NULL)
          #   indexes     111 → 113 (+2: seller_leads/buyer_leads (archived_at))
          # Sin cambio: tables=31, without_rls=0, forced=0, policies=0.
          assert tables "$tables" 31
          assert columns "$columns" 439
          assert enums "$enums" 50
          assert enum_values "$enum_values" 266
          assert foreign_keys "$fks" 67
          assert indexes "$indexes" 113
          assert tables_without_rls "$without_rls" 0
          assert tables_forced_rls "$forced" 0
          assert policies "$policies" 0

      - name: Second migrate deploy is idempotent
        run: |
          set -euo pipefail
          out=$(pnpm prisma migrate deploy 2>&1)
          echo "$out"
          echo "$out" | grep -qi "No pending migrations to apply" || { echo "el segundo deploy no fue idempotente"; exit 1; }

  supabase-storage:
    name: supabase-storage
    runs-on: ubuntu-latest
    # Supabase LOCAL efímero (Docker del runner) para validar buckets + políticas de
    # `storage.objects` con Storage REAL. Independiente de quality/integration/migration-replay.
    # NUNCA usa `supabase link`, `--linked`, `--project-ref` ni `db push`: solo comandos locales.
    # No usa secretos remotos ni se conecta a staging/producción.
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard — no remote linkage before starting Supabase
        run: |
          set -euo pipefail
          for v in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_ID SUPABASE_PROJECT_REF; do
            if [ -n "${!v:-}" ]; then echo "variable remota presente ($v); abortando"; exit 1; fi
          done
          if [ -f supabase/.temp/project-ref ]; then echo "proyecto remoto enlazado; abortando"; exit 1; fi
          echo "sin enlace remoto"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (local Docker only)
        # La salida de `supabase start` imprime las claves locales (anon/service_role, claves demo
        # públicas del stack local) ANTES de poder enmascararlas. Se silencia a un fichero; en caso
        # de fallo se muestra un extracto SIN líneas de claves. Las credenciales se leen después con
        # `supabase status -o env` y se enmascaran con `::add-mask::`.
        run: |
          set -euo pipefail
          supabase start > "$RUNNER_TEMP/supabase-start.log" 2>&1 \
            || { grep -ivE 'key|secret|token|jwt' "$RUNNER_TEMP/supabase-start.log" || true; exit 1; }

      - name: Export local Supabase credentials (masked)
        run: |
          set -euo pipefail
          supabase status -o env > "$RUNNER_TEMP/sb.env"
          api_url=$(grep -E '^API_URL=' "$RUNNER_TEMP/sb.env" | cut -d= -f2- | tr -d '"')
          anon=$(grep -E '^ANON_KEY=' "$RUNNER_TEMP/sb.env" | cut -d= -f2- | tr -d '"')
          service=$(grep -E '^SERVICE_ROLE_KEY=' "$RUNNER_TEMP/sb.env" | cut -d= -f2- | tr -d '"')
          db_url=$(grep -E '^DB_URL=' "$RUNNER_TEMP/sb.env" | cut -d= -f2- | tr -d '"')
          # No se vuelca ningún valor al log; las claves se enmascaran.
          echo "::add-mask::$anon"
          echo "::add-mask::$service"
          {
            echo "SUPABASE_URL=$api_url"
            echo "NEXT_PUBLIC_SUPABASE_URL=$api_url"
            echo "SUPABASE_ANON_KEY=$anon"
            echo "SUPABASE_SERVICE_ROLE_KEY=$service"
            echo "SUPABASE_DB_URL=$db_url"
          } >> "$GITHUB_ENV"

      - name: Guard — Supabase endpoints are local
        run: pnpm assert:local-supabase

      - name: Apply storage migrations (local)
        # Reaplica supabase/migrations de forma determinista sobre el Postgres local. No hay
        # seed.sql en el repo, así que no se siembran datos.
        run: supabase db reset

      - name: Verify storage buckets and policies (catalog invariants)
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/check-storage-policies.sql

      - name: Real Storage policy tests
        run: pnpm test:supabase

      - name: Supabase logs on failure
        if: failure()
        # Estado sin volcar claves al log (se filtran las líneas de claves/tokens).
        run: supabase status 2>&1 | grep -ivE 'key|secret|token|jwt' || true

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
