name: CI

# Gate de calidad: corre en cada push a main y en todos los PR.
# La regla de protección de rama exige que el job "quality" quede en verde antes de mergear.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    # Valores dummy: 'prisma generate' no conecta a la DB y los tests unitarios mockean Prisma.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      DIRECT_URL: postgresql://user:pass@localhost:5432/db?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
