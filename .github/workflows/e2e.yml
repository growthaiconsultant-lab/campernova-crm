name: E2E

# E2E autenticado contra STAGING. No bloquea el merge (necesita secretos + DB viva).
# Se lanza a mano (workflow_dispatch) o cada noche (schedule).
#
# Requiere estos secrets del repo (entorno de staging — ver Phase 4 / README § Entornos):
#   E2E_BASE_URL                     URL de la app de staging (p.ej. preview de Vercel)
#   STAGING_NEXT_PUBLIC_SUPABASE_URL
#   STAGING_SUPABASE_SERVICE_ROLE_KEY
#   E2E_USER_EMAIL                   usuario sembrado en staging (rol ADMIN)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *' # 05:00 UTC diario

jobs:
  e2e:
    name: playwright
    runs-on: ubuntu-latest
    # Solo corre si el secreto base está configurado (evita fallos en forks/sin staging).
    if: ${{ github.repository_owner == 'growthaiconsultant-lab' }}
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E (vs staging)
        run: pnpm test:e2e
